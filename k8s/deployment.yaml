apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-onboarding-service
  labels:
    app: employee-onboarding-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-onboarding-service

  template:
    metadata:
      labels:
        app: employee-onboarding-service

    spec:
      containers:
      - name: employee-onboarding-service

        image: bhadekunal/onboarding-service:15

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: SPRING_PROFILES_ACTIVE
          value: dev

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"

          limits:
            memory: "1024Mi"
            cpu: "500m"
